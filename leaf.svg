  <!-- Leaf veins -->
  <path d="M175 50 Q175 150 175 350" stroke="#1a4a3a" stroke-width="3" fill="none"/>
  <path d="M175 150 Q220 180 250 220" stroke="#1a4a3a" stroke-width="2" fill="none"/>
  <path d="M175 150 Q130 180 100 220" stroke="#1a4a3a" stroke-width="2" fill="none"/>
  <path d="M175 200 Q200 230 220 260" stroke="#1a4a3a" stroke-width="1.5" fill="none"/>
  <path d="M175 200 Q150 230 130 260" stroke="#1a4a3a" stroke-width="1.5" fill="none"/>

  <!-- Leaf stem -->
  <path d="M175 350 Q175 380 175 400" stroke="#2d6a4f" stroke-width="4" fill="none"/>
</svg>