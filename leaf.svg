<svg width="350" height="400" viewBox="0 0 350 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60f2b0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#52b788;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main leaf shape -->
  <path d="M175 50 Q250 100 300 200 Q280 300 200 350 Q150 370 100 350 Q50 320 30 250 Q20 180 50 120 Q80 80 130 60 Q160 50 175 50"
